# https://github.com/wimpysworld/nix-config/blob/main/.github/workflows/flake-checker.yml
name: Flake ❄️ Checker ✅

on:
  push:
    branches:
      - main
  schedule:
    # l33t o'clock
    - cron: '37 13 * * *'
  workflow_dispatch:

jobs:
  flake-checker:
    name: Flake Checker
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/flake-checker-action@v12

  build-configs:
    name: Build Darwin Configs
    needs: flake-checker
    runs-on: macos-26
    strategy:
      matrix:
        config: [macbook, work]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v22
      - name: Build ${{ matrix.config }}
        run: nix --extra-experimental-features 'nix-command flakes' build ".#darwinConfigurations.${{ matrix.config }}.system"